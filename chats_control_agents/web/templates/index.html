<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude 桥接</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f5f5f5; }
  #app { max-width: 720px; margin: 0 auto; padding: 12px; }
  #log { background: #fff; border: 1px solid #ddd; border-radius: 6px;
         height: 60vh; overflow-y: auto; padding: 12px; }
  .msg { margin: 8px 0; padding: 8px 12px; border-radius: 8px; max-width: 80%;
         white-space: pre-wrap; word-break: break-word; }
  .user { background: #d0e4ff; margin-left: auto; text-align: left; }
  .claude { background: #efefef; }
  .meta { font-size: 11px; color: #999; margin-bottom: 2px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  #form { display: flex; gap: 8px; margin-top: 10px; }
  #input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  #send { padding: 10px 20px; background: #007aff; color: #fff; border: 0;
          border-radius: 6px; cursor: pointer; font-size: 14px; }
  #send:disabled { background: #999; }
  #status { font-size: 12px; color: #888; margin-top: 6px; min-height: 16px; }
  /* Workspace + projects panel */
  details.panel { background: #fff; border: 1px solid #ddd; border-radius: 6px;
                  margin-bottom: 8px; padding: 6px 12px; }
  details.panel > summary { cursor: pointer; font-size: 13px; color: #555;
                            padding: 4px 0; user-select: none; }
  details.panel[open] > summary { color: #007aff; font-weight: 500; }
  .ws-list { margin: 8px 0 4px 0; }
  .ws-row { display: flex; gap: 6px; align-items: center; margin: 4px 0; font-size: 13px; }
  .ws-row input { flex: 1; padding: 5px 8px; border: 1px solid #ccc;
                  border-radius: 4px; font-size: 13px; font-family: monospace; }
  .ws-row input.missing { border-color: #d33; background: #fee; }
  .ws-row button { padding: 4px 10px; border: 0; border-radius: 4px;
                   cursor: pointer; font-size: 12px; }
  .ws-row button.del { background: #fdd; color: #a00; }
  .ws-actions { display: flex; gap: 6px; margin-top: 6px; }
  .ws-actions button { padding: 6px 14px; border: 0; border-radius: 4px;
                       cursor: pointer; font-size: 13px; }
  .ws-actions button.primary { background: #007aff; color: #fff; }
  .ws-actions button.add { background: #e5f1ff; color: #007aff; }
  .ws-msg { font-size: 12px; color: #888; min-height: 16px; margin-top: 4px; }
  .ws-msg.err { color: #d33; }
  .ws-msg.ok { color: #2a8; }
  /* Projects list */
  .proj-current { font-size: 12px; color: #666; margin: 8px 0 4px 0; }
  .proj-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee;
               border-radius: 4px; }
  .proj-item { display: flex; gap: 8px; padding: 6px 8px; align-items: center;
               border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer; }
  .proj-item:last-child { border-bottom: 0; }
  .proj-item:hover { background: #f7f9ff; }
  .proj-item.online { font-weight: 500; }
  .proj-item .name { flex: 1; }
  .proj-item .tag { font-size: 11px; padding: 1px 6px; border-radius: 3px; }
  .proj-item .tag.online  { background: #dcfce7; color: #166534; }
  .proj-item .tag.offline { background: #fef3c7; color: #92400e; }
  .proj-item .tag.idle    { background: #eef2f7; color: #64748b; }
  .proj-item .root { font-size: 11px; color: #aaa; font-family: monospace; }
  /* Toolbar above chat log */
  .chat-toolbar { display: flex; align-items: center; gap: 8px;
                  margin: 4px 0 8px; }
  .chat-toolbar .right { margin-left: auto; }
  .chat-toolbar button.tbtn { padding: 7px 14px; border: 0; border-radius: 6px;
                       font-size: 13px; cursor: pointer; background: #3576f5;
                       color: #fff; font-family: inherit; }
  .chat-toolbar button.tbtn:hover { background: #2563eb; }
  .chat-toolbar button.tbtn.secondary { background: #eef2f7; color: #1f2937; }
  /* Modal */
  .modal-mask { display: none; position: fixed; inset: 0;
                background: rgba(15,23,42,0.45); z-index: 99;
                align-items: center; justify-content: center;
                backdrop-filter: blur(2px); }
  .modal-mask.show { display: flex; }
  .modal-box { background: #fff; border-radius: 10px; padding: 24px 26px;
               max-width: 440px; width: 90%; border: 1px solid #e2e8f0;
               box-shadow: 0 12px 40px rgba(15,23,42,0.18); }
  .modal-box h2 { margin: 0 0 6px; font-size: 16px; font-weight: 600; }
  .modal-box .hint { font-size: 13px; color: #64748b; margin-bottom: 16px; }
  .modal-box .field { margin-top: 10px; }
  .modal-box label { font-size: 12px; color: #64748b; display: block; margin-bottom: 4px; }
  .modal-box input { width: 100%; padding: 9px 11px; border: 1px solid #e2e8f0;
                     border-radius: 6px; font-size: 13px; font-family: monospace;
                     box-sizing: border-box; }
  .modal-box input:focus { outline: 0; border-color: #3576f5;
                           box-shadow: 0 0 0 3px rgba(53,118,245,0.12); }
  .modal-box .row { display: flex; gap: 8px; margin-top: 14px; }
  .modal-box .row button { flex: 1; padding: 9px 14px; border: 0; border-radius: 6px;
                            font-size: 13px; cursor: pointer; font-family: inherit; }
  .modal-box .row button.primary { background: #3576f5; color: #fff; }
  .modal-box .row button.primary:hover { background: #2563eb; }
  .modal-box .row button.secondary { background: #eef2f7; color: #1f2937; }
  .modal-box .row button.secondary:hover { background: #e2e8f0; }
  .modal-box .msg { font-size: 12px; margin-top: 12px; min-height: 18px; color: #64748b; }
  .modal-box .msg.err { color: #dc2626; }
  .modal-box .msg.ok  { color: #16a34a; }
  .modal-box .close-row { display: flex; justify-content: flex-end; margin-top: 10px; }
  .modal-box .close-row button { padding: 6px 12px; background: transparent;
                                  color: #3576f5; border: 0; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>
<nav style="background:#fff; border-bottom:1px solid #e2e8f0; padding:12px 24px;
            display:flex; align-items:center; gap:16px;">
  <span style="font-weight:600; font-size:15px;">Agent Bridge</span>
  <div style="margin-left:auto; display:flex; gap:4px;">
    <a href="/"         style="color:#64748b; text-decoration:none; padding:6px 12px; border-radius:6px; font-size:13px;">Dashboard</a>
    <a href="/chat"     style="color:#3576f5; background:rgba(53,118,245,0.08); text-decoration:none; padding:6px 12px; border-radius:6px; font-size:13px;">聊天</a>
    <a href="/settings" style="color:#64748b; text-decoration:none; padding:6px 12px; border-radius:6px; font-size:13px;">设置</a>
  </div>
</nav>
<div id="app">
  <details class="panel" id="ws-panel">
    <summary>📁 项目列表（点击展开 · 用 <code>/proj</code> 命令也能拉起）</summary>
    <div style="margin-top: 6px;">
      <div style="font-size: 12px; color: #888;">
        工作空间根目录的编辑搬到了 <a href="/settings#workspace" style="color:#3576f5;">设置 · 工作空间</a>。
      </div>
      <div class="proj-current" id="proj-current"></div>
      <div class="proj-list" id="proj-list"></div>
    </div>
  </details>
  <div class="chat-toolbar">
    <span style="font-size:12px; color:#64748b;">当前会话：<b id="tb-current" style="color:#1f2937">--</b></span>
    <div class="right">
      <button type="button" class="tbtn" id="tb-new">+ 开始新会话</button>
    </div>
  </div>
  <div id="log"></div>
  <form id="form">
    <input id="input" placeholder="输入消息，回车发送…" autocomplete="off">
    <button id="send" type="submit">发送</button>
  </form>
  <div id="status"></div>
</div>

<!-- new-session modal -->
<div id="modal" class="modal-mask">
  <div class="modal-box">
    <h2>开始新会话</h2>
    <div class="hint">新会话会用 <code>&lt;项目名&gt;-&lt;MMDD-HHMM&gt;</code> 命名。</div>
    <div class="field">
      <label>AI 后端</label>
      <select id="m-backend" style="width:100%;padding:9px 11px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit;box-sizing:border-box;">
        <option value="claude_code">Claude Code（本地 TUI，首次约 30s）</option>
        <option value="hermes_acp">Hermes ACP（LexAI reasoning，首次约 10s）</option>
      </select>
    </div>
    <div class="row">
      <button type="button" id="m-chat" class="secondary">💬 纯聊天 (cwd = home)</button>
    </div>
    <div class="field">
      <label>或：项目路径</label>
      <input id="m-cwd" placeholder="D:/aiproject/agent-bridge">
    </div>
    <div class="row">
      <button type="button" id="m-proj" class="primary">📂 进入项目</button>
    </div>
    <div id="m-status" class="msg"></div>
    <div class="close-row">
      <button type="button" id="m-cancel">取消</button>
    </div>
  </div>
</div>

<script>
const logEl = document.getElementById('log');
const formEl = document.getElementById('form');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
let pollTimer = null;

function render(items) {
  logEl.innerHTML = '';
  for (const m of items) {
    const row = document.createElement('div');
    row.className = 'row ' + m.role;
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = (m.role === 'user' ? '我' : 'Claude') + ' · ' + m.ts.slice(11, 19);
    div.appendChild(meta);
    const body = document.createElement('div');
    body.textContent = m.text;
    div.appendChild(body);
    row.appendChild(div);
    logEl.appendChild(row);
  }
  logEl.scrollTop = logEl.scrollHeight;
}

async function fetchHistory() {
  const r = await fetch('/history');
  const items = await r.json();
  render(items);
  return items;
}

async function send(text) {
  sendBtn.disabled = true;
  statusEl.textContent = '已发送，等待 Claude 回复…（如果是第一条，先在 Claude Code 窗口说"启动 chats-loop"）';
  await fetch('/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text}),
  });
  const items = await fetchHistory();
  pollSince = Array.isArray(items) ? items.length : 0;
  startPoll();
}

// Persistent poll: as long as the page is open we keep polling so new
// history entries land in the UI immediately. We don't try to "guess" when
// Claude is done — mcp calls can block arbitrarily long (user idle, Claude
// waiting on slow tools, etc.). The send button unlocks as soon as we see
// any new history entry after our last send, so the user can keep typing.
let pollSince = 0;       // marker: number of history items at time of send
function startPoll() {
  if (pollTimer) return;
  let lastLen = -1;
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch('/poll');
      const data = await r.json();
      if (data.history && data.history.length !== lastLen) {
        render(data.history);
        lastLen = data.history.length;
        // Unlock send button when at least one new entry has arrived since
        // this send. Mid-turn narration counts — user sees something is
        // happening and may want to type next question already.
        if (data.history.length > pollSince) {
          sendBtn.disabled = false;
          if (statusEl.textContent.startsWith('已发送')) statusEl.textContent = '';
        }
      }
    } catch (e) {
      // transient network blip — keep going
    }
  }, 1500);
}

formEl.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  send(text);
});

// ── Projects panel ─────────────────────────────────────────────────────
const projCurrentEl = document.getElementById('proj-current');
const projListEl = document.getElementById('proj-list');
const wsPanel = document.getElementById('ws-panel');

async function fetchProjects() {
  try {
    const [pr, sr] = await Promise.all([
      fetch('/projects').then(r => r.json()),
      fetch('/sessions').then(r => r.json()),
    ]);
    const currentAlias = sr.current;
    projCurrentEl.textContent = `当前会话：${currentAlias}`;
    projListEl.innerHTML = '';
    pr.projects.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'proj-item' + (p.online ? ' online' : '');
      const num = document.createElement('span');
      num.textContent = `${i + 1}.`;
      num.style.color = '#aaa';
      num.style.minWidth = '24px';
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = p.name;
      const tag = document.createElement('span');
      if (p.online) {
        tag.className = 'tag online';
        tag.textContent = `在线 → ${p.alias}`;
      } else if (p.alias) {
        tag.className = 'tag offline';
        tag.textContent = `离线 → ${p.alias}`;
      } else {
        tag.className = 'tag idle';
        tag.textContent = '未运行';
      }
      const root = document.createElement('span');
      root.className = 'root';
      root.textContent = p.root;
      item.appendChild(num);
      item.appendChild(name);
      item.appendChild(tag);
      item.appendChild(root);
      item.addEventListener('click', () => pickProject(i + 1, p));
      projListEl.appendChild(item);
    });
  } catch (e) {
    projCurrentEl.textContent = '加载项目失败：' + e.message;
  }
}

async function pickProject(n, p) {
  // Use the same /send -> /proj -> integer pick flow as WeChat so behavior is
  // identical across surfaces. First send /proj to populate the choice list,
  // then send the integer immediately.
  statusEl.textContent = `切换到 ${p.name}…`;
  try {
    await fetch('/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: '/proj'}),
    });
    const r = await fetch('/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: String(n)}),
    });
    const data = await r.json();
    if (data.reply) {
      statusEl.textContent = data.reply.split('\\n')[0].slice(0, 80);
    } else {
      statusEl.textContent = '已切换';
    }
    await fetchHistory();
    fetchProjects();  // refresh online/offline state
  } catch (e) {
    statusEl.textContent = '切换失败：' + e.message;
  }
}

// Refresh project state whenever the panel is opened
wsPanel.addEventListener('toggle', () => {
  if (wsPanel.open) fetchProjects();
});

// Boot: render history once, then start permanent poll loop so messages
// from another tab / a mid-turn hook still appear without user interaction.
fetchHistory().then(items => {
  pollSince = Array.isArray(items) ? items.length : 0;
  startPoll();
});

// Eagerly fetch projects on boot so first panel open is instant.
fetchProjects();

// ── Toolbar: current session label + new-session modal ───────
const tbCurrentEl = document.getElementById('tb-current');
async function refreshToolbarCurrent() {
  try {
    const r = await fetch('/dashboard/status');
    const d = await r.json();
    tbCurrentEl.textContent = d.current || '(无)';
  } catch (e) { /* silent */ }
}
refreshToolbarCurrent();
setInterval(refreshToolbarCurrent, 5000);

const modal   = document.getElementById('modal');
const mStatus = document.getElementById('m-status');
const mCwd    = document.getElementById('m-cwd');

function openModal() {
  modal.classList.add('show');
  mStatus.textContent = ''; mStatus.className = 'msg';
  mCwd.value = '';
}
function closeModal() { modal.classList.remove('show'); }

document.getElementById('tb-new').addEventListener('click', openModal);
document.getElementById('m-cancel').addEventListener('click', closeModal);

async function createSession(mode, project_cwd) {
  const backend = document.getElementById('m-backend').value || 'claude_code';
  mStatus.textContent = `正在拉起 ${backend} daemon（最多 60s）…`; mStatus.className = 'msg';
  try {
    const r = await fetch('/session/new', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mode, project_cwd, backend}),
    });
    const d = await r.json();
    if (d.ok) {
      mStatus.className = 'msg ok';
      mStatus.textContent = `✅ 已创建 ${d.alias}，加载中…`;
      // Re-fetch everything: history of new alias, project state, etc.
      setTimeout(() => {
        closeModal();
        refreshToolbarCurrent();
        fetchHistory();
        fetchProjects();
      }, 500);
    } else {
      mStatus.className = 'msg err';
      mStatus.textContent = `失败：${d.error || '未知'}` + (d.alias ? ` (alias=${d.alias})` : '');
    }
  } catch (e) {
    mStatus.className = 'msg err';
    mStatus.textContent = `网络错误：${e.message}`;
  }
}

document.getElementById('m-chat').addEventListener('click', () => createSession('chat'));
document.getElementById('m-proj').addEventListener('click', () => {
  const cwd = mCwd.value.trim();
  if (!cwd) {
    mStatus.className = 'msg err';
    mStatus.textContent = '请输入项目路径';
    return;
  }
  createSession('project', cwd);
});
</script>
</body>
</html>
